defaults:
  temperature: 0.4
  max_tokens: 2048

providers:
  google_ai_studio:
    base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
    keys: []
  openrouter:
    base_url: "https://openrouter.ai/api/v1"
    keys:
      - "${OPENROUTER_API_KEY}"
  dashscope:
    base_url: "https://dashscope-intl.aliyuncs.com/compatible-mode/v1"
    keys:
      - "${DASHSCOPE_API_KEY}"

stable_gemini: &stable_gemini gemini-2.5-flash
stable_qwen: &stable_qwen dashscope/qwen3-coder-plus

agents:
  director:
    model: *stable_gemini
    provider: google_ai_studio
    temperature: 0.5
    max_tokens: 2048
    target_scenes: 1
  planner:
    model: *stable_gemini
    provider: google_ai_studio
    temperature: 0.3
    max_tokens: 6144
  builder:
    model: *stable_gemini
    provider: google_ai_studio
    temperature: 0.1
    max_tokens: 4096
  code_reviewer:
    model: *stable_gemini
    provider: google_ai_studio
    temperature: 0.1
    max_tokens: 4096
  visual_reviewer:
    model: *stable_gemini
    provider: google_ai_studio
    temperature: 0.1
    max_tokens: 4096
  repair:
    model: *stable_gemini
    provider: google_ai_studio
    temperature: 0.05
    max_tokens: 4096
  scene_designer:
    model: *stable_gemini
    provider: google_ai_studio
    temperature: 0.2
    max_tokens: 4096

builder_review_loop:
  max_rounds: 3
  visual_reviewer_enabled: true
  use_dsl_pipeline: true
  early_stop:
    require_all:
      - code_review_passed
      - visual_review_passed
  pass_criteria:
    code_review_passed:
      agent_blocking_issues_empty: true
      static_ast_parse_ok: true
      static_forbidden_imports_ok: true
    visual_review_passed:
      agent_blocking_issues_empty: true
  blocking_severity_min: warning
  stop_when_only_info_severity: false
  on_max_rounds_exceeded: fail
  pre_render_validation: true
  repair_max_attempts: 2

runtime_limits:
  worker:
    manim_render_timeout_seconds: 3600
    tts_subprocess_timeout_seconds: 600
  preview_poll:
    timeout_seconds: 1800
    interval_seconds: 2.0
  llm_request_timeout_seconds:
    default: 600
    planner: 600
    builder: 1200
    code_reviewer: 600
    visual_reviewer: 600
    repair: 600
    scene_designer: 600
