defaults:
  model: gemini-3-flash-preview
  temperature: 0.3
  max_tokens: 4096
  reasoning_effort: medium

agents:
  idea_sketcher:
    model: gemini-3-flash-preview
    temperature: 0.2
    max_tokens: 4096
    reasoning_effort: low
  storyboarder:
    model: gemini-3-flash-preview
    temperature: 0.3
    max_tokens: 16384
    reasoning_effort: medium
  builder:
    model: gemini-3-flash-preview
    temperature: 0.1
    max_tokens: 8192
    reasoning_effort: medium
  # code_reviewer and visual_reviewer use the review_loop tiers below
  # for model escalation.  These entries are only used if the step
  # executor ever needs a "single-shot" model for the initial analysis.
  code_reviewer:
    model: gemma-4-31b-it
    temperature: 0.1
    max_tokens: 4096
    reasoning_effort: none
  visual_reviewer:
    model: gemma-4-31b-it
    temperature: 0.1
    max_tokens: 4096
    reasoning_effort: none

# Model escalation tiers for review loops (code_reviewer & visual_reviewer)
review_loop:
  tiers:
    - model: gemma-4-31b-it
      max_attempts: 1
      reasoning_effort: none
    - model: gemini-3-flash-preview
      max_attempts: 1
      reasoning_effort: low
    - model: gemini-3.5-flash
      reasoning_effort: medium
      # Uses REVIEW_LOOP_MAX_ATTEMPTS (default 3).
