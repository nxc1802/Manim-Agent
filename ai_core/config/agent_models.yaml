defaults:
  model: gemini-3.5-flash
  temperature: 0.3
  max_tokens: 4096
  reasoning_effort: high

agents:
  idea_sketcher:
    model: gemini-3-flash-preview
    temperature: 0.5
    max_tokens: 4096
    reasoning_effort: high

  storyboarder:
    model: gemini-3.5-flash
    temperature: 0.3
    max_tokens: 16384
    reasoning_effort: high

  builder:
    model: gemini-3.6-flash
    temperature: 0.1
    max_tokens: 8192
    reasoning_effort: high

  code_reviewer:
    temperature: 0.1
    max_tokens: 4096
    review_tiers:
      - model: gemini-3.5-flash-lite
        max_attempts: 1
        reasoning_effort: high
      - model: gemini-3.5-flash
        max_attempts: 1
        reasoning_effort: high
      - model: gemini-3.6-flash
        reasoning_effort: high

  visual_reviewer:
    temperature: 0.1
    max_tokens: 4096
    review_tiers:
      - model: gemini-3.5-flash-lite
        max_attempts: 1
        reasoning_effort: high
      - model: gemini-3.5-flash
        max_attempts: 1
        reasoning_effort: high
      - model: gemini-3.6-flash
        reasoning_effort: high
