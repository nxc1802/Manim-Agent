# Verify Hugging Face Spaces (3 Docker Space repo ids) after GHCR images exist.
#
# Secrets (Settings → Secrets and variables → Actions → Secrets):
#   HF_TOKEN — one token with read access to all three Spaces (write if you push from CI later)
#
# Variables (same place → Variables — not Secrets):
#   HF_SPACE_API_REPO              e.g. Cuong2004/Manim-Agent
#   HF_SPACE_MANIM_WORKER_REPO     e.g. Cuong2004/Manim-Agent-Worker-Render
#   HF_SPACE_TTS_WORKER_REPO       e.g. Cuong2004/Manim-Agent-Worker-TTS
#
# One HF_TOKEN is enough if the same HF account owns all Spaces.

name: Hugging Face Spaces

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Docker images (API + Workers)"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  verify-spaces:
    runs-on: ubuntu-latest
    # Only run when triggered manually, or after docker-publish succeeded on main
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_SPACE_API_REPO: ${{ vars.HF_SPACE_API_REPO }}
      HF_SPACE_MANIM_WORKER_REPO: ${{ vars.HF_SPACE_MANIM_WORKER_REPO }}
      HF_SPACE_TTS_WORKER_REPO: ${{ vars.HF_SPACE_TTS_WORKER_REPO }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install huggingface_hub
        run: python -m pip install -U pip huggingface_hub

      - name: Verify Space repos
        run: python scripts/hf_verify_spaces.py
