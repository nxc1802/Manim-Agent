# Only GitHub Actions workflow: push thin Docker Space bundles to three Hugging Face Spaces.
#
# Secrets:  HF_TOKEN
# Variables: HF_SPACE_API_REPO, HF_SPACE_MANIM_WORKER_REPO, HF_SPACE_TTS_WORKER_REPO
# Optional variable: HF_IMAGE_TAG (default latest) — must match tags you pushed to GHCR.

name: Deploy Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-spaces:
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_SPACE_API_REPO: ${{ vars.HF_SPACE_API_REPO }}
      HF_SPACE_MANIM_WORKER_REPO: ${{ vars.HF_SPACE_MANIM_WORKER_REPO }}
      HF_SPACE_TTS_WORKER_REPO: ${{ vars.HF_SPACE_TTS_WORKER_REPO }}
      HF_IMAGE_TAG: ${{ vars.HF_IMAGE_TAG }}
      GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install huggingface_hub
        run: python -m pip install -U pip huggingface_hub

      - name: Sync three Spaces (clear + README + Dockerfile)
        run: python scripts/sync_hf_spaces.py
