# Three jobs only (one per Hugging Face Space). Each job runs paths-filter locally — no extra "changes" job.
# workflow_dispatch always deploys that Space; push to main deploys only when paths match.
#
# Secrets: HF_TOKEN
# Variables: HF_SPACE_* , optional HF_IMAGE_TAG

name: Deploy Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-api:
    name: HF Space — API
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_SPACE_API_REPO: ${{ vars.HF_SPACE_API_REPO }}
      HF_IMAGE_TAG: ${{ vars.HF_IMAGE_TAG }}
      GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_SHA: ${{ github.sha }}
      GITHUB_RUN_ID: ${{ github.run_id }}
      HF_SYNC_TARGET: api
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            relevant:
              - 'docker/api/**'
              - 'backend/**'
              - 'shared/**'
              - 'primitives/**'
              - 'ai_engine/**'
              - 'worker/**'
              - 'pyproject.toml'
              - 'requirements.txt'
              - 'README.md'
              - 'scripts/sync_hf_spaces.py'
              - '.github/workflows/deploy-hf-spaces.yml'

      - id: should_run
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.filter.outputs.relevant }}" = "true" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (no matching paths)
        if: steps.should_run.outputs.deploy != 'true'
        run: echo "Skipping API Space — no matching file changes on this push."

      - uses: actions/setup-python@v5
        if: steps.should_run.outputs.deploy == 'true'
        with:
          python-version: "3.12"

      - if: steps.should_run.outputs.deploy == 'true'
        run: python -m pip install -U pip huggingface_hub

      - if: steps.should_run.outputs.deploy == 'true'
        run: python scripts/sync_hf_spaces.py

  deploy-render:
    name: HF Space — Render worker
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_SPACE_MANIM_WORKER_REPO: ${{ vars.HF_SPACE_MANIM_WORKER_REPO }}
      HF_IMAGE_TAG: ${{ vars.HF_IMAGE_TAG }}
      GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_SHA: ${{ github.sha }}
      GITHUB_RUN_ID: ${{ github.run_id }}
      HF_SYNC_TARGET: worker
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            relevant:
              - 'docker/worker/**'
              - 'backend/**'
              - 'shared/**'
              - 'primitives/**'
              - 'ai_engine/**'
              - 'worker/**'
              - 'examples/**'
              - 'docs/**'
              - 'pyproject.toml'
              - 'requirements.txt'
              - 'scripts/sync_hf_spaces.py'
              - '.github/workflows/deploy-hf-spaces.yml'

      - id: should_run
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.filter.outputs.relevant }}" = "true" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (no matching paths)
        if: steps.should_run.outputs.deploy != 'true'
        run: echo "Skipping Render worker Space — no matching file changes on this push."

      - uses: actions/setup-python@v5
        if: steps.should_run.outputs.deploy == 'true'
        with:
          python-version: "3.12"

      - if: steps.should_run.outputs.deploy == 'true'
        run: python -m pip install -U pip huggingface_hub

      - if: steps.should_run.outputs.deploy == 'true'
        run: python scripts/sync_hf_spaces.py

  deploy-tts:
    name: HF Space — TTS worker
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_SPACE_TTS_WORKER_REPO: ${{ vars.HF_SPACE_TTS_WORKER_REPO }}
      HF_IMAGE_TAG: ${{ vars.HF_IMAGE_TAG }}
      GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_SHA: ${{ github.sha }}
      GITHUB_RUN_ID: ${{ github.run_id }}
      HF_SYNC_TARGET: tts-worker
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            relevant:
              - 'docker/tts-worker/**'
              - 'backend/**'
              - 'shared/**'
              - 'ai_engine/**'
              - 'worker/**'
              - 'pyproject.toml'
              - 'requirements.txt'
              - 'scripts/sync_hf_spaces.py'
              - '.github/workflows/deploy-hf-spaces.yml'

      - id: should_run
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.filter.outputs.relevant }}" = "true" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (no matching paths)
        if: steps.should_run.outputs.deploy != 'true'
        run: echo "Skipping TTS worker Space — no matching file changes on this push."

      - uses: actions/setup-python@v5
        if: steps.should_run.outputs.deploy == 'true'
        with:
          python-version: "3.12"

      - if: steps.should_run.outputs.deploy == 'true'
        run: python -m pip install -U pip huggingface_hub

      - if: steps.should_run.outputs.deploy == 'true'
        run: python scripts/sync_hf_spaces.py
