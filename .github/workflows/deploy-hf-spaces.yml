# Three jobs (one per Space). Each push to main runs paths-filter; matching jobs stage
# deploy/huggingface/<bundle>/ (Dockerfile.in + README.template.md), render placeholders,
# then git push --force to https://huggingface.co/spaces/<repo> (no huggingface_hub / Python SDK).
#
# Worker Spaces stay "Running" via FastAPI on PORT in worker_health.py (image built from this repo).
#
# Secrets: HF_TOKEN  |  Variables: HF_SPACE_* , optional HF_IMAGE_TAG

name: Deploy Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-api:
    name: HF Space — API
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_SPACE_REPO: ${{ vars.HF_SPACE_API_REPO }}
      HF_BUNDLE: deploy/huggingface/api
      HF_IMAGE_TAG: ${{ vars.HF_IMAGE_TAG }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            relevant:
              - 'docker/api/**'
              - 'backend/**'
              - 'shared/**'
              - 'primitives/**'
              - 'ai_engine/**'
              - 'worker/**'
              - 'pyproject.toml'
              - 'requirements.txt'
              - 'README.md'
              - 'CONTRIBUTING.md'
              - 'deploy/huggingface/**'
              - 'scripts/push_hf_space.sh'
              - '.github/workflows/deploy-hf-spaces.yml'

      - id: should_run
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.filter.outputs.relevant }}" = "true" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (no matching paths)
        if: steps.should_run.outputs.deploy != 'true'
        run: echo "Skipping API Space — no matching file changes on this push."

      - name: Stage bundle and git push --force to Space
        if: steps.should_run.outputs.deploy == 'true'
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          chmod +x scripts/push_hf_space.sh
          OWNER=$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          TAG="${HF_IMAGE_TAG:-latest}"
          export GHCR_IMAGE="ghcr.io/${OWNER}/manim-agent-api:${TAG}"
          export COMMIT_MESSAGE="[API] ${HF_SPACE_REPO} @ ${GITHUB_SHA:0:7} (run ${GITHUB_RUN_ID})"
          bash scripts/push_hf_space.sh

  deploy-render:
    name: HF Space — Render worker
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_SPACE_REPO: ${{ vars.HF_SPACE_MANIM_WORKER_REPO }}
      HF_BUNDLE: deploy/huggingface/render-worker
      HF_IMAGE_TAG: ${{ vars.HF_IMAGE_TAG }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            relevant:
              - 'docker/worker/**'
              - 'backend/**'
              - 'shared/**'
              - 'primitives/**'
              - 'ai_engine/**'
              - 'worker/**'
              - 'worker/worker_health.py'
              - 'examples/**'
              - 'docs/**'
              - 'pyproject.toml'
              - 'requirements.txt'
              - 'README.md'
              - 'CONTRIBUTING.md'
              - 'deploy/huggingface/**'
              - 'scripts/push_hf_space.sh'
              - '.github/workflows/deploy-hf-spaces.yml'

      - id: should_run
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.filter.outputs.relevant }}" = "true" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (no matching paths)
        if: steps.should_run.outputs.deploy != 'true'
        run: echo "Skipping Render worker Space — no matching file changes on this push."

      - name: Stage bundle and git push --force to Space
        if: steps.should_run.outputs.deploy == 'true'
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          chmod +x scripts/push_hf_space.sh
          OWNER=$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          TAG="${HF_IMAGE_TAG:-latest}"
          export GHCR_IMAGE="ghcr.io/${OWNER}/manim-agent-worker:${TAG}"
          export COMMIT_MESSAGE="[Render] ${HF_SPACE_REPO} @ ${GITHUB_SHA:0:7} (run ${GITHUB_RUN_ID})"
          bash scripts/push_hf_space.sh

  deploy-tts:
    name: HF Space — TTS worker
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_SPACE_REPO: ${{ vars.HF_SPACE_TTS_WORKER_REPO }}
      HF_BUNDLE: deploy/huggingface/tts-worker
      HF_IMAGE_TAG: ${{ vars.HF_IMAGE_TAG }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            relevant:
              - 'docker/tts-worker/**'
              - 'backend/**'
              - 'shared/**'
              - 'ai_engine/**'
              - 'worker/**'
              - 'worker/worker_health.py'
              - 'pyproject.toml'
              - 'requirements.txt'
              - 'README.md'
              - 'CONTRIBUTING.md'
              - 'deploy/huggingface/**'
              - 'scripts/push_hf_space.sh'
              - '.github/workflows/deploy-hf-spaces.yml'

      - id: should_run
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.filter.outputs.relevant }}" = "true" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (no matching paths)
        if: steps.should_run.outputs.deploy != 'true'
        run: echo "Skipping TTS worker Space — no matching file changes on this push."

      - name: Stage bundle and git push --force to Space
        if: steps.should_run.outputs.deploy == 'true'
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          chmod +x scripts/push_hf_space.sh
          OWNER=$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          TAG="${HF_IMAGE_TAG:-latest}"
          export GHCR_IMAGE="ghcr.io/${OWNER}/manim-agent-tts-worker:${TAG}"
          export COMMIT_MESSAGE="[TTS] ${HF_SPACE_REPO} @ ${GITHUB_SHA:0:7} (run ${GITHUB_RUN_ID})"
          bash scripts/push_hf_space.sh
