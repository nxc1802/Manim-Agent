# Three jobs — each stages a monorepo *slice* (backend, shared, worker, ai_engine, …) matching
# the COPY instructions in the chosen Dockerfile, copies docker/<role>/Dockerfile → ./Dockerfile,
# renders README from deploy/huggingface/*/README.template.md, then git push --force to the Space.
# No thin FROM ghcr.io-only repos: Hugging Face builds the image from source on each Space.
#
# Secrets: HF_TOKEN  |  Variables: HF_SPACE_API_REPO, HF_SPACE_MANIM_WORKER_REPO, HF_SPACE_TTS_WORKER_REPO

name: Deploy Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: CI Gate (Lint + Test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev libcairo2-dev libpango1.0-dev ffmpeg pkg-config
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - run: ruff check backend primitives shared tests worker ai_engine
      - run: mypy backend primitives shared worker
      - run: pytest tests/unit -q --tb=short

  deploy-api:
    name: HF Space — API
    needs: [ci]
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_SPACE_REPO: ${{ vars.HF_SPACE_API_REPO }}
      HF_DEPLOY_FLAVOR: api
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            relevant:
              - 'docker/api/**'
              - 'backend/**'
              - 'shared/**'
              - 'primitives/**'
              - 'ai_engine/**'
              - 'worker/**'
              - 'pyproject.toml'
              - 'requirements.txt'
              - 'README.md'
              - 'CONTRIBUTING.md'
              - 'deploy/huggingface/**'
              - 'scripts/ops/push_hf_space.sh'
              - '.github/workflows/deploy-hf-spaces.yml'

      - id: should_run
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.filter.outputs.relevant }}" = "true" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (no matching paths)
        if: steps.should_run.outputs.deploy != 'true'
        run: echo "Skipping API Space — no matching file changes on this push."

      - name: Stage slice + Dockerfile + git push --force
        if: steps.should_run.outputs.deploy == 'true'
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          chmod +x scripts/ops/push_hf_space.sh
          export COMMIT_MESSAGE="[API] ${HF_SPACE_REPO} @ ${GITHUB_SHA:0:7} (run ${GITHUB_RUN_ID})"
          bash scripts/ops/push_hf_space.sh

      - name: Smoke test API
        if: steps.should_run.outputs.deploy == 'true'
        env:
          MANIM_AGENT_API_HF: "https://${{ vars.HF_SPACE_API_REPO }}.hf.space"
        run: |
          chmod +x scripts/ops/smoke_hf_spaces.sh
          # Wait a bit for HF build to at least start/provision
          echo "Waiting for HF deployment to stabilize..."
          sleep 30 
          # Note: Smoke test might fail if HF build is slow, but it's a good signal
          bash scripts/ops/smoke_hf_spaces.sh

  deploy-render:
    name: HF Space — Render worker
    needs: [ci]
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_SPACE_REPO: ${{ vars.HF_SPACE_MANIM_WORKER_REPO }}
      HF_DEPLOY_FLAVOR: render
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            relevant:
              - 'docker/worker/**'
              - 'backend/**'
              - 'shared/**'
              - 'primitives/**'
              - 'ai_engine/**'
              - 'worker/**'
              - 'worker/worker_health.py'
              - 'docs/**'
              - 'pyproject.toml'
              - 'requirements.txt'
              - 'README.md'
              - 'CONTRIBUTING.md'
              - 'deploy/huggingface/**'
              - 'scripts/ops/push_hf_space.sh'
              - '.github/workflows/deploy-hf-spaces.yml'

      - id: should_run
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.filter.outputs.relevant }}" = "true" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (no matching paths)
        if: steps.should_run.outputs.deploy != 'true'
        run: echo "Skipping Render worker Space — no matching file changes on this push."

      - name: Stage slice + Dockerfile + git push --force
        if: steps.should_run.outputs.deploy == 'true'
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          chmod +x scripts/ops/push_hf_space.sh
          export COMMIT_MESSAGE="[Render] ${HF_SPACE_REPO} @ ${GITHUB_SHA:0:7} (run ${GITHUB_RUN_ID})"
          bash scripts/ops/push_hf_space.sh

  deploy-tts:
    name: HF Space — TTS worker
    needs: [ci]
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_SPACE_REPO: ${{ vars.HF_SPACE_TTS_WORKER_REPO }}
      HF_DEPLOY_FLAVOR: tts
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            relevant:
              - 'docker/tts-worker/**'
              - 'backend/**'
              - 'shared/**'
              - 'ai_engine/**'
              - 'worker/**'
              - 'worker/worker_health.py'
              - 'pyproject.toml'
              - 'requirements.txt'
              - 'README.md'
              - 'CONTRIBUTING.md'
              - 'deploy/huggingface/**'
              - 'scripts/ops/push_hf_space.sh'
              - '.github/workflows/deploy-hf-spaces.yml'

      - id: should_run
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.filter.outputs.relevant }}" = "true" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (no matching paths)
        if: steps.should_run.outputs.deploy != 'true'
        run: echo "Skipping TTS worker Space — no matching file changes on this push."

      - name: Stage slice + Dockerfile + git push --force
        if: steps.should_run.outputs.deploy == 'true'
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          chmod +x scripts/ops/push_hf_space.sh
          export COMMIT_MESSAGE="[TTS] ${HF_SPACE_REPO} @ ${GITHUB_SHA:0:7} (run ${GITHUB_RUN_ID})"
          bash scripts/ops/push_hf_space.sh
