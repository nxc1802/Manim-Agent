# Publishes linux/amd64 images to GHCR for local/K8s and for Hugging Face Spaces (Docker SDK).
# Repo: https://github.com/nxc1802/Manim-Agent
# HF: three Spaces (API, Manim worker, TTS worker) — set repo variables / secrets (HF_TOKEN,
# HF_SPACE_*_REPO) and use workflow `hf-spaces.yml`, or point each Space Dockerfile at:
#   FROM ghcr.io/<owner>/manim-agent-{api,worker,tts-worker}:main

name: Docker images (API + Workers)

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - suffix: api
            dockerfile: docker/api/Dockerfile
          - suffix: worker
            dockerfile: docker/worker/Dockerfile
          - suffix: tts-worker
            dockerfile: docker/tts-worker/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image owner
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
        shell: bash

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_OWNER }}/manim-agent-${{ matrix.suffix }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-
            type=ref,event=tag

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.suffix }}
