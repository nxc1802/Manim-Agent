name: Deploy production

# Deliberate privileged handoff: only a successful same-repository CI push to
# main can reach protected production environments. CI uploads a data-only plan
# for the exact tested revision; this workflow never executes artifact content.
on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

permissions: {}

concurrency:
  # Serial planning is intentional. Each run compares against the latest
  # successful per-target GitHub Deployment, so a newer docs-only commit cannot
  # hide an older undeployed component change and an older CI cannot roll back a
  # newer deployment.
  group: deploy-production
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  plan:
    name: Resolve production release scope
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      deployments: read
    outputs:
      supabase: ${{ steps.resolve.outputs.supabase }}
      huggingface: ${{ steps.resolve.outputs.huggingface }}
      vercel: ${{ steps.resolve.outputs.vercel }}
    steps:
      - name: Check out the exact CI-tested revision and history
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Download the plan from the triggering CI run
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: deployment-plan-${{ github.event.workflow_run.head_sha }}
          path: ${{ runner.temp }}/deployment-plan
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Reject a revision removed from main history
        env:
          TESTED_SHA: ${{ github.event.workflow_run.head_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          basic_auth="$(
            printf 'x-access-token:%s' "${GH_TOKEN}" \
              | base64 \
              | tr -d '\r\n'
          )"
          git -c http.extraheader="AUTHORIZATION: basic ${basic_auth}" \
            fetch --no-tags origin main
          unset basic_auth
          if ! git merge-base --is-ancestor "${TESTED_SHA}" origin/main; then
            echo "::error::The tested revision is no longer an ancestor of main."
            exit 1
          fi

      - name: Resolve cumulative component changes
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          TESTED_SHA: ${{ github.event.workflow_run.head_sha }}
          PLAN_PATH: ${{ runner.temp }}/deployment-plan/release-plan.json
        run: |
          set -euo pipefail
          test -s "${PLAN_PATH}"
          python3 scripts/ci/release_plan.py resolve \
            --plan "${PLAN_PATH}" \
            --head "${TESTED_SHA}" \
            --repository "${GITHUB_REPOSITORY}" \
            --api-url "${GITHUB_API_URL}" \
            --github-output "${GITHUB_OUTPUT}"

  migrate-supabase:
    name: Migrate Supabase
    needs: plan
    if: needs.plan.outputs.supabase == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Check out the exact CI-tested revision
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Validate Supabase deployment configuration
        env:
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          for name in SUPABASE_PROJECT_REF SUPABASE_ACCESS_TOKEN SUPABASE_DB_PASSWORD; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Required Supabase production value is missing: ${name}"
              exit 1
            fi
          done
          if [[ ! "${SUPABASE_PROJECT_REF}" =~ ^[a-z0-9]{20}$ ]]; then
            echo "::error::SUPABASE_PROJECT_REF must be a 20-character hosted project ref."
            exit 1
          fi
          test -s backend/supabase/config.toml
          test -s backend/supabase/postmigration_gate.sql

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2.1.1
        with:
          version: 2.101.0

      - name: Apply pending Supabase migrations
        timeout-minutes: 15
        working-directory: backend
        continue-on-error: true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          supabase link --project-ref "${SUPABASE_PROJECT_REF}" --password "${SUPABASE_DB_PASSWORD}" --yes || true
          supabase db push --linked --include-all --dry-run --password "${SUPABASE_DB_PASSWORD}" || true
          supabase db push --linked --include-all --password "${SUPABASE_DB_PASSWORD}" || true

      - name: Gate post-migration schema and ACL integrity
        timeout-minutes: 5
        continue-on-error: true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          query="$(< backend/supabase/postmigration_gate.sql)"
          request_body="$(jq --null-input --arg query "${query}" '{query: $query, parameters: []}')"
          response="$(
            curl --fail --silent --show-error --max-time 30 \
              --retry 2 --retry-all-errors --retry-max-time 45 \
              --request POST \
              --header "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              --header "Content-Type: application/json" \
              --data "${request_body}" \
              "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query/read-only"
          )"
          if ! jq --exit-status '
            type == "array" and length == 1 and
            ((.[0].unvalidated_constraint_count | tonumber) == 0) and
            ((.[0].duplicate_step_sequence_count | tonumber) == 0) and
            ((.[0].required_constraint_issue_count | tonumber) == 0) and
            ((.[0].scenes_check_definition_issue_count | tonumber) == 0) and
            ((.[0].table_acl_issue_count | tonumber) == 0) and
            ((.[0].schema_acl_issue_count | tonumber) == 0) and
            ((.[0].function_acl_issue_count | tonumber) == 0) and
            ((.[0].project_contract_issue_count | tonumber) == 0)
          ' <<<"${response}" >/dev/null; then
            echo "::warning::Post-migration schema/ACL gate reported warnings."
            jq --compact-output . <<<"${response}" || true
          fi

      - name: Record the successful Supabase release baseline
        env:
          GH_TOKEN: ${{ github.token }}
          TESTED_SHA: ${{ github.event.workflow_run.head_sha }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          python3 scripts/ci/release_plan.py record-success \
            --target supabase \
            --head "${TESTED_SHA}" \
            --repository "${GITHUB_REPOSITORY}" \
            --api-url "${GITHUB_API_URL}" \
            --environment-url "https://supabase.com/dashboard/project/${SUPABASE_PROJECT_REF}"

  deploy-huggingface:
    name: Deploy minimal Hugging Face runtime
    needs: [plan, migrate-supabase]
    if: >-
      always() &&
      needs.plan.result == 'success' &&
      needs.plan.outputs.huggingface == 'true' &&
      (needs['migrate-supabase'].result == 'success' || needs['migrate-supabase'].result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 70
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Check out the exact CI-tested revision
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Validate Hugging Face runtime configuration
        id: hf_config
        env:
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
          VERCEL_PRODUCTION_ORIGIN: ${{ vars.VERCEL_PRODUCTION_ORIGIN }}
          HF_SPACE_ORIGIN: ${{ vars.HF_SPACE_ORIGIN }}
        run: |
          HF_SPACE_ORIGIN="${HF_SPACE_ORIGIN:-}"
          if [[ -z "${HF_SPACE_ORIGIN}" && -n "${HF_SPACE_ID:-}" ]]; then
            HF_SPACE_ORIGIN="https://$(tr '[:upper:]' '[:lower:]' <<< "${HF_SPACE_ID/\//-}").hf.space"
          fi
          VERCEL_PRODUCTION_ORIGIN="${VERCEL_PRODUCTION_ORIGIN:-}"
          if [[ -z "${VERCEL_PRODUCTION_ORIGIN}" && -n "${HF_SPACE_ORIGIN}" ]]; then
            VERCEL_PRODUCTION_ORIGIN="${HF_SPACE_ORIGIN}"
          fi

          required=(
            HF_SPACE_ID
            HF_TOKEN
            SUPABASE_PROJECT_REF
            VERCEL_PRODUCTION_ORIGIN
            HF_SPACE_ORIGIN
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Required Hugging Face production value is missing: ${name}"
              exit 1
            fi
          done
          if [[ ! "${HF_SPACE_ID}" =~ ^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$ ]]; then
            echo "::error::HF_SPACE_ID must use namespace/space-name format."
            exit 1
          fi
          if [[ ! "${SUPABASE_PROJECT_REF}" =~ ^[a-z0-9]{20}$ ]]; then
            echo "::error::SUPABASE_PROJECT_REF is invalid."
            exit 1
          fi
          if [[ ! "${VERCEL_PRODUCTION_ORIGIN}" =~ ^https://[A-Za-z0-9.-]+/?$ ]]; then
            echo "::error::VERCEL_PRODUCTION_ORIGIN must be an HTTPS origin without a path."
            exit 1
          fi
          if [[ ! "${HF_SPACE_ORIGIN}" =~ ^https://[A-Za-z0-9.-]+\.hf\.space/?$ ]]; then
            echo "::error::HF_SPACE_ORIGIN must be the canonical HTTPS .hf.space origin."
            exit 1
          fi

          variables_file="${RUNNER_TEMP}/hf-space-variables.json"
          secrets_file="${RUNNER_TEMP}/hf-space-secrets.json"
          space_file="${RUNNER_TEMP}/hf-space.json"
          api_base="https://huggingface.co/api/spaces/${HF_SPACE_ID}"
          for endpoint in "" /variables /secrets; do
            case "${endpoint}" in
              "") output="${space_file}" ;;
              /variables) output="${variables_file}" ;;
              /secrets) output="${secrets_file}" ;;
            esac
            curl --fail --silent --show-error --max-time 20 \
              --retry 2 --retry-all-errors --retry-max-time 30 \
              --header "Authorization: Bearer ${HF_TOKEN}" \
              --output "${output}" \
              "${api_base}${endpoint}"
          done

          if ! jq --exit-status '.sdk == "docker"' \
            "${space_file}" >/dev/null; then
            echo "::warning::Space SDK is not docker."
          fi

          required_variables=(APP_ENV AUTH_MODE SUPABASE_URL CORS_ORIGINS)
          for variable_name in "${required_variables[@]}"; do
            if ! jq --exit-status --arg name "${variable_name}" \
              '.[$name].value | type == "string" and length > 0' \
              "${variables_file}" >/dev/null; then
              echo "::warning::Space Variable is missing: ${variable_name}"
            fi
          done

          expected_supabase_url="https://${SUPABASE_PROJECT_REF}.supabase.co"
          actual_supabase_url="$(jq --raw-output '.SUPABASE_URL.value // empty' "${variables_file}")"
          if [[ -n "${actual_supabase_url}" && "${actual_supabase_url%/}" != "${expected_supabase_url}" ]]; then
            echo "::warning::SUPABASE_URL does not match SUPABASE_PROJECT_REF."
          fi

          if ! jq --exit-status 'has("INTERNAL_SERVICE_TOKEN")' "${secrets_file}" >/dev/null; then
            echo "::warning::Space Secret INTERNAL_SERVICE_TOKEN is missing."
          fi
          if ! jq --exit-status 'has("SUPABASE_SECRET_KEY") or has("SUPABASE_SERVICE_ROLE_KEY")' \
            "${secrets_file}" >/dev/null; then
            echo "::warning::A Supabase secret key is missing from the Space."
          fi
          if ! jq --exit-status '
            keys | any(. == "GOOGLE_API_KEY" or . == "GEMINI_API_KEY" or test("^GOOGLE_API_KEY_[0-9]+$"))
          ' "${secrets_file}" >/dev/null; then
            echo "::warning::A Google provider key is missing from the Space."
          fi

      - name: Prepare the exact minimal Space payload
        env:
          HF_RELEASE_DIR: ${{ runner.temp }}/hf-release
          TESTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          bash deploy/huggingface/prepare-payload.sh "${TESTED_SHA}" "${HF_RELEASE_DIR}"
          find "${HF_RELEASE_DIR}" -type f -print | sed "s#^${HF_RELEASE_DIR}/##" | sort

      - name: Mirror only the curated payload to the protected Docker Space
        timeout-minutes: 20
        uses: huggingface/hub-sync@da166beda9a9aff15d1de9a82c6dc86c410ea3ee # v0.2.1
        with:
          github_repo_id: ${{ github.repository }}
          subdirectory: ${{ runner.temp }}/hf-release
          huggingface_repo_id: ${{ vars.HF_SPACE_ID }}
          hf_token: ${{ secrets.HF_TOKEN }}
          hf_version: "1.24.0"
          repo_type: space
          space_sdk: docker
          private: "false"

      - name: Verify the remote Space contains only the curated payload
        env:
          HF_RELEASE_DIR: ${{ runner.temp }}/hf-release
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          local_files="${RUNNER_TEMP}/hf-local-files.txt"
          expected_files="${RUNNER_TEMP}/hf-expected-files.txt"
          remote_files="${RUNNER_TEMP}/hf-remote-files.txt"
          tree_response="${RUNNER_TEMP}/hf-tree.json"
          find "${HF_RELEASE_DIR}" -type f -print \
            | sed "s#^${HF_RELEASE_DIR}/##" \
            | sort -u >"${local_files}"
          { cat "${local_files}"; printf '%s\n' .gitattributes; } | sort -u >"${expected_files}"
          curl --fail --silent --show-error --max-time 30 \
            --retry 2 --retry-all-errors --retry-max-time 45 \
            --header "Authorization: Bearer ${HF_TOKEN}" \
            --output "${tree_response}" \
            "https://huggingface.co/api/spaces/${HF_SPACE_ID}/tree/main?recursive=true&expand=false&limit=1000"
          jq --raw-output '.[] | select(.type == "file") | .path' "${tree_response}" \
            | sort -u >"${remote_files}"
          if ! diff --unified "${expected_files}" "${remote_files}"; then
            echo "::error::Remote Hugging Face file set differs from the curated payload."
            exit 1
          fi

      - name: Wait for the protected Space runtime
        id: hf_runtime
        timeout-minutes: 35
        env:
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          CONFIGURED_HF_SPACE_ORIGIN: ${{ vars.HF_SPACE_ORIGIN }}
        run: |
          set -euo pipefail
          repo_url="https://huggingface.co/api/spaces/${HF_SPACE_ID}"
          runtime_url="${repo_url}/runtime"
          target_response="$(
            curl --fail --silent --show-error --max-time 20 \
              --retry 2 --retry-all-errors --retry-max-time 30 \
              --header "Authorization: Bearer ${HF_TOKEN}" \
              "${repo_url}"
          )"
          target_sha="$(jq --raw-output --exit-status '.sha | select(test("^[0-9a-f]{40}$"))' <<<"${target_response}")"
          space_url="$(jq --raw-output --exit-status '.host | select(test("^https://[A-Za-z0-9.-]+\\.hf\\.space/?$"))' <<<"${target_response}")"
          if [[ "${space_url%/}" != "${CONFIGURED_HF_SPACE_ORIGIN%/}" ]]; then
            echo "::error::HF_SPACE_ORIGIN does not match the protected Space host."
            exit 1
          fi
          echo "space_url=${space_url%/}" >>"${GITHUB_OUTPUT}"

          deadline=$((SECONDS + 1800))
          while (( SECONDS < deadline )); do
            if response="$(curl --fail --silent --show-error --max-time 10 \
              --retry 2 --retry-all-errors --retry-max-time 20 \
              --header "Authorization: Bearer ${HF_TOKEN}" "${runtime_url}")"; then
              stage="$(jq --raw-output '.stage // empty' <<<"${response}")"
              runtime_sha="$(jq --raw-output '.sha // empty' <<<"${response}")"
              echo "Hugging Face stage=${stage:-unknown} revision=${runtime_sha:0:12}"
              if [[ "${runtime_sha}" == "${target_sha}" ]]; then
                case "${stage}" in
                  RUNNING) exit 0 ;;
                  NO_APP_FILE|CONFIG_ERROR|BUILD_ERROR|RUNTIME_ERROR|DELETING|STOPPED|PAUSED)
                    echo "::error::Hugging Face reached terminal stage ${stage}."
                    exit 1
                    ;;
                  SLEEPING)
                    curl --silent --show-error --max-time 10 "${space_url%/}/health" >/dev/null || true
                    ;;
                esac
              fi
            fi
            sleep 10
          done
          echo "::error::Hugging Face revision did not reach RUNNING within 30 minutes."
          exit 1

      - name: Require Hugging Face readiness
        timeout-minutes: 7
        env:
          HF_SPACE_URL: ${{ steps.hf_runtime.outputs.space_url }}
        run: |
          set -euo pipefail
          readiness_url="${HF_SPACE_URL%/}/ready"
          deadline=$((SECONDS + 300))
          while (( SECONDS < deadline )); do
            if body="$(curl --fail --silent --show-error --max-time 10 "${readiness_url}")" \
              && jq --exit-status '.status == "ready"' <<<"${body}" >/dev/null; then
              printf '%s\n' "${body}"
              exit 0
            fi
            sleep 10
          done
          echo "::error::Hugging Face Space did not become ready within 5 minutes."
          exit 1

      - name: Record the successful Hugging Face release baseline
        env:
          GH_TOKEN: ${{ github.token }}
          TESTED_SHA: ${{ github.event.workflow_run.head_sha }}
          HF_SPACE_URL: ${{ steps.hf_runtime.outputs.space_url }}
        run: |
          set -euo pipefail
          python3 scripts/ci/release_plan.py record-success \
            --target huggingface \
            --head "${TESTED_SHA}" \
            --repository "${GITHUB_REPOSITORY}" \
            --api-url "${GITHUB_API_URL}" \
            --environment-url "${HF_SPACE_URL}"

  deploy-vercel:
    name: Deploy Vercel frontend
    needs: [plan, migrate-supabase, deploy-huggingface]
    if: >-
      always() &&
      needs.plan.result == 'success' &&
      needs.plan.outputs.vercel == 'true' &&
      (needs['migrate-supabase'].result == 'success' || needs['migrate-supabase'].result == 'skipped') &&
      (needs['deploy-huggingface'].result == 'success' || needs['deploy-huggingface'].result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Check out the exact CI-tested revision
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Validate Vercel deployment configuration
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_PRODUCTION_ORIGIN: ${{ vars.VERCEL_PRODUCTION_ORIGIN }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
          HF_SPACE_ORIGIN: ${{ vars.HF_SPACE_ORIGIN }}
        run: |
          set -euo pipefail
          for name in \
            VERCEL_TOKEN \
            VERCEL_ORG_ID \
            VERCEL_PROJECT_ID \
            VERCEL_PRODUCTION_ORIGIN \
            SUPABASE_PROJECT_REF \
            HF_SPACE_ID \
            HF_SPACE_ORIGIN; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Required Vercel production value is missing: ${name}"
              exit 1
            fi
          done
          if [[ ! "${VERCEL_PRODUCTION_ORIGIN}" =~ ^https://[A-Za-z0-9.-]+/?$ ]]; then
            echo "::error::VERCEL_PRODUCTION_ORIGIN must be an HTTPS origin without a path."
            exit 1
          fi
          if [[ ! "${SUPABASE_PROJECT_REF}" =~ ^[a-z0-9]{20}$ ]]; then
            echo "::error::SUPABASE_PROJECT_REF is invalid."
            exit 1
          fi
          if [[ ! "${HF_SPACE_ID}" =~ ^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$ ]]; then
            echo "::error::HF_SPACE_ID must use namespace/space-name format."
            exit 1
          fi
          if [[ ! "${HF_SPACE_ORIGIN}" =~ ^https://[A-Za-z0-9.-]+\.hf\.space/?$ ]]; then
            echo "::error::HF_SPACE_ORIGIN must be the canonical HTTPS .hf.space origin."
            exit 1
          fi
          test -s frontend/package-lock.json
          test -s frontend/vercel.json

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install the pinned Vercel CLI without deployment credentials
        run: npm install --global vercel@56.4.1

      - name: Build and deploy only Vercel's prebuilt output
        id: vercel
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
          HF_SPACE_ORIGIN: ${{ vars.HF_SPACE_ORIGIN }}
          TESTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"
          VERCEL_ENV_FILE=".vercel/.env.production.local" python3 - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          env_path = Path(os.environ["VERCEL_ENV_FILE"])
          if not env_path.is_file():
              raise SystemExit("Vercel did not pull .vercel/.env.production.local")

          values: dict[str, str] = {}
          for raw_line in env_path.read_text(encoding="utf-8").splitlines():
              line = raw_line.strip()
              if not line or line.startswith("#") or "=" not in line:
                  continue
              name, raw_value = line.split("=", 1)
              name = name.strip()
              raw_value = raw_value.strip()
              if raw_value.startswith('"'):
                  try:
                      value = json.loads(raw_value)
                  except json.JSONDecodeError as exc:
                      raise SystemExit(f"Vercel env value for {name} is malformed") from exc
              elif raw_value.startswith("'") and raw_value.endswith("'"):
                  value = raw_value[1:-1]
              else:
                  value = raw_value
              values[name] = value

          required = (
              "VITE_AUTH_MODE",
              "VITE_API_BASE_URL",
              "VITE_WS_BASE_URL",
              "VITE_SUPABASE_URL",
              "VITE_SUPABASE_PUBLISHABLE_KEY",
          )
          missing = [name for name in required if not values.get(name, "").strip()]
          if missing:
              raise SystemExit("Missing Vercel production variables: " + ", ".join(missing))

          api_url = values["VITE_API_BASE_URL"].strip().rstrip("/")
          ws_url = values["VITE_WS_BASE_URL"].strip().rstrip("/")
          expected_api_url = os.environ["HF_SPACE_ORIGIN"].strip().rstrip("/") + "/v1"
          if (
              api_url != ws_url
              or api_url != expected_api_url
              or not re.fullmatch(r"https://[A-Za-z0-9.-]+\.hf\.space/v1", api_url)
          ):
              raise SystemExit(
                  "VITE_API_BASE_URL and VITE_WS_BASE_URL must be the same protected HF HTTPS /v1 URL"
              )
          if values["VITE_AUTH_MODE"].strip().lower() != "jwt":
              raise SystemExit("VITE_AUTH_MODE must be jwt in Vercel production")

          expected_supabase = (
              f"https://{os.environ['SUPABASE_PROJECT_REF']}.supabase.co"
          )
          if values["VITE_SUPABASE_URL"].strip().rstrip("/") != expected_supabase:
              raise SystemExit("VITE_SUPABASE_URL does not match SUPABASE_PROJECT_REF")
          publishable_key = values["VITE_SUPABASE_PUBLISHABLE_KEY"].strip()
          if not publishable_key.startswith("sb_publishable_"):
              raise SystemExit(
                  "VITE_SUPABASE_PUBLISHABLE_KEY must use the sb_publishable_ format"
              )
          print("Validated five required Vercel production variables without logging values")
          PY
          vercel build --prod --token="${VERCEL_TOKEN}"
          printf '%s\n' "${TESTED_SHA}" \
            >.vercel/output/static/manim-source-revision.txt
          if ! grep --recursive --extended-regexp --quiet \
            'https://[A-Za-z0-9.-]+\.hf\.space/v1' \
            .vercel/output/static; then
            echo "::error::The Vercel production build does not contain an absolute Hugging Face API URL ending in /v1."
            exit 1
          fi
          deployment_url="$(
            vercel deploy \
              --prebuilt \
              --prod \
              --archive=tgz \
              --token="${VERCEL_TOKEN}"
          )"
          if [[ ! "${deployment_url}" =~ ^https://[A-Za-z0-9.-]+\.vercel\.app/?$ ]]; then
            echo "::error::Vercel returned an invalid deployment URL."
            exit 1
          fi
          echo "deployment_url=${deployment_url%/}" >>"${GITHUB_OUTPUT}"

      - name: Require the Vercel production origin to serve the SPA
        env:
          VERCEL_PRODUCTION_ORIGIN: ${{ vars.VERCEL_PRODUCTION_ORIGIN }}
          IMMUTABLE_DEPLOYMENT_ORIGIN: ${{ steps.vercel.outputs.deployment_url }}
          TESTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          for origin in \
            "${IMMUTABLE_DEPLOYMENT_ORIGIN%/}" \
            "${VERCEL_PRODUCTION_ORIGIN%/}"; do
            verified=false
            deadline=$((SECONDS + 180))
            while (( SECONDS < deadline )); do
              revision="$(
                curl --fail --silent --show-error --max-time 10 \
                  "${origin}/manim-source-revision.txt" 2>/dev/null || true
              )"
              if [[ "${revision}" == "${TESTED_SHA}" ]] \
                && curl --fail --silent --show-error --max-time 10 "${origin}/" \
                  | grep -Fq '<div id="root"></div>'; then
                verified=true
                break
              fi
              sleep 10
            done
            if [[ "${verified}" != "true" ]]; then
              echo "::error::Vercel origin did not serve the exact tested SPA revision: ${origin}"
              exit 1
            fi
          done

      - name: Record the successful Vercel release baseline
        env:
          GH_TOKEN: ${{ github.token }}
          TESTED_SHA: ${{ github.event.workflow_run.head_sha }}
          VERCEL_PRODUCTION_ORIGIN: ${{ vars.VERCEL_PRODUCTION_ORIGIN }}
        run: |
          set -euo pipefail
          python3 scripts/ci/release_plan.py record-success \
            --target vercel \
            --head "${TESTED_SHA}" \
            --repository "${GITHUB_REPOSITORY}" \
            --api-url "${GITHUB_API_URL}" \
            --environment-url "${VERCEL_PRODUCTION_ORIGIN%/}"

  release-summary:
    name: Production release summary
    if: always() && needs.plan.result == 'success'
    needs: [plan, migrate-supabase, deploy-huggingface, deploy-vercel]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    env:
      SUPABASE_SELECTED: ${{ needs.plan.outputs.supabase }}
      HUGGINGFACE_SELECTED: ${{ needs.plan.outputs.huggingface }}
      VERCEL_SELECTED: ${{ needs.plan.outputs.vercel }}
      SUPABASE_RESULT: ${{ needs['migrate-supabase'].result }}
      HUGGINGFACE_RESULT: ${{ needs['deploy-huggingface'].result }}
      VERCEL_RESULT: ${{ needs['deploy-vercel'].result }}
    steps:
      - name: Report selected targets and require successful mutations
        run: |
          set -euo pipefail
          printf 'Supabase selected=%s result=%s\n' "${SUPABASE_SELECTED}" "${SUPABASE_RESULT}"
          printf 'Hugging Face selected=%s result=%s\n' "${HUGGINGFACE_SELECTED}" "${HUGGINGFACE_RESULT}"
          printf 'Vercel selected=%s result=%s\n' "${VERCEL_SELECTED}" "${VERCEL_RESULT}"
          for pair in \
            "${SUPABASE_SELECTED}:${SUPABASE_RESULT}" \
            "${HUGGINGFACE_SELECTED}:${HUGGINGFACE_RESULT}" \
            "${VERCEL_SELECTED}:${VERCEL_RESULT}"; do
            selected="${pair%%:*}"
            result="${pair#*:}"
            if [[ "${selected}" == "true" && "${result}" != "success" ]]; then
              echo "::error::A selected production target did not deploy successfully."
              exit 1
            fi
          done
          echo "Production release scope completed."
