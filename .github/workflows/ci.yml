name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rls_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      REDIS_URL: redis://127.0.0.1:6379/0
      CELERY_BROKER_URL: redis://127.0.0.1:6379/0
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/0
      POSTGRES_RLS_TEST_URL: postgresql://postgres:postgres@127.0.0.1:5432/rls_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Manim)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libcairo2-dev \
            libpango1.0-dev \
            ffmpeg

      - name: Install dependencies
        run: python -m pip install -U pip && python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check ai_engine backend primitives shared tests worker

      - name: Mypy
        run: mypy ai_engine backend primitives shared worker

      - name: Pytest (unit)
        run: >
          pytest tests/unit -q
          --cov=ai_engine
          --cov=backend
          --cov=primitives
          --cov=shared/schemas
          --cov=worker
          --cov-report=term-missing
          --cov-fail-under=75

      - name: Pytest (integration — Postgres RLS)
        run: pytest tests/integration -q -m integration

  e2e:
    runs-on: ubuntu-latest
    needs: test
    env:
      CI: "true"
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      REDIS_URL: redis://127.0.0.1:6379/0
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Manim)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libcairo2-dev \
            libpango1.0-dev \
            ffmpeg

      - name: Install dependencies
        run: python -m pip install -U pip && python -m pip install -e ".[dev]"

      - name: Pytest (e2e — skips if OPENROUTER_API_KEY unset)
        run: pytest tests/e2e -m e2e -q --tb=short
