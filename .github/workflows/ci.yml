name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend lint and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: python -m pip install --upgrade pip && pip install -e ".[dev]"
      - run: ruff check app tests
      - run: PYTHONPATH=.:.. pytest -q

  ai-core:
    name: AI Core lint and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai_core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ai_core/requirements.txt
      - run: sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev ffmpeg pkg-config
      - run: python -m pip install --upgrade pip && pip install -e ".[dev]"
      - run: ruff check app tests
      - run: PYTHONPATH=.:.. pytest -q

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
