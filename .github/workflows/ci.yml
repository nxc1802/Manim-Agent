name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  changes:
    name: Release scope
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.plan.outputs.backend }}
      ai_core: ${{ steps.plan.outputs.ai_core }}
      frontend: ${{ steps.plan.outputs.frontend }}
      migrations: ${{ steps.plan.outputs.migrations }}
      dependency_audit: ${{ steps.plan.outputs.dependency_audit }}
      python_dependency_audit: ${{ steps.plan.outputs.python_dependency_audit }}
      frontend_dependency_audit: ${{ steps.plan.outputs.frontend_dependency_audit }}
      production_image: ${{ steps.plan.outputs.production_image }}
      workflow: ${{ steps.plan.outputs.workflow }}
      supabase: ${{ steps.plan.outputs.supabase }}
      huggingface: ${{ steps.plan.outputs.huggingface }}
      vercel: ${{ steps.plan.outputs.vercel }}
    steps:
      - name: Check out complete history for exact change detection
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create the immutable release plan
        id: plan
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BASE_SHA: ${{ github.event.before }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          CHECKED_SHA: ${{ github.sha }}
          PLAN_PATH: ${{ runner.temp }}/release-plan.json
          GH_TOKEN: ${{ github.event_name == 'push' && github.token || '' }}
        run: |
          set -euo pipefail
          head_sha="${CHECKED_SHA}"
          force_all_ci=false
          cumulative_ci=false
          case "${EVENT_NAME}" in
            push)
              base_sha="${PUSH_BASE_SHA}"
              cumulative_ci=true
              ;;
            pull_request)
              head_sha="${PR_HEAD_SHA}"
              base_sha="$(git merge-base "${PR_BASE_SHA}" "${PR_HEAD_SHA}")"
              ;;
            workflow_dispatch)
              base_sha="$(git rev-parse "${CHECKED_SHA}^")"
              force_all_ci=true
              ;;
            *)
              echo "::error::Unsupported CI event: ${EVENT_NAME}"
              exit 1
              ;;
          esac

          arguments=(
            create
            --base "${base_sha}"
            --head "${head_sha}"
            --output "${PLAN_PATH}"
            --github-output "${GITHUB_OUTPUT}"
          )
          if [[ "${force_all_ci}" == "true" ]]; then
            arguments+=(--force-all-ci)
          fi
          if [[ "${cumulative_ci}" == "true" ]]; then
            arguments+=(
              --cumulative-ci
              --repository "${GITHUB_REPOSITORY}"
              --api-url "${GITHUB_API_URL}"
            )
          fi
          python3 scripts/ci/release_plan.py "${arguments[@]}"

      - name: Upload the trusted deployment plan
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deployment-plan-${{ github.sha }}
          path: ${{ runner.temp }}/release-plan.json
          if-no-files-found: error
          retention-days: 1

  backend:
    name: Backend / Python 3.12
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
        working-directory: backend
    steps:
      - name: Check out the tested revision
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/pyproject.toml
            backend/requirements*.txt
            backend/requirements*.lock

      - name: Install locked dependencies
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check "pip==26.1.2"
          test -s requirements.lock
          test -s requirements-dev.lock
          python -m pip install --require-hashes -r requirements-dev.lock
          python -m pip install --no-deps -e .
          python -m pip check

      - name: Lint
        run: ruff check app tests

      - name: Test
        env:
          PYTHONPATH: .:..
        run: pytest -q

  ai-core:
    name: AI Core / Python 3.12
    needs: changes
    if: needs.changes.outputs.ai_core == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        shell: bash
        working-directory: ai_core
    steps:
      - name: Check out the tested revision
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            ai_core/pyproject.toml
            ai_core/requirements*.txt
            ai_core/requirements*.lock

      - name: Install Manim system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            ffmpeg \
            libcairo2-dev \
            libpango1.0-dev \
            pkg-config

      - name: Install locked dependencies
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check "pip==26.1.2"
          test -s requirements.lock
          test -s requirements-dev.lock
          python -m pip install --require-hashes -r requirements-dev.lock
          python -m pip install --no-deps -e .
          python -m pip check

      - name: Lint
        run: ruff check app tests

      - name: Test
        env:
          PYTHONPATH: .:..
        run: pytest -q

  frontend:
    name: Frontend / Node 22
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
        working-directory: frontend
    steps:
      - name: Check out the tested revision
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies exactly from lockfile
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build production assets
        env:
          VITE_API_BASE_URL: /v1
          VITE_WS_BASE_URL: /v1
          VITE_AUTH_MODE: "off"
        run: npm run build

  migrations:
    name: Replay Supabase migrations
    needs: changes
    if: needs.changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out the tested revision
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false

      - name: Validate and replay migrations
        run: bash backend/supabase/validate_migrations.sh

  dependency-audit:
    name: Repository security and scoped dependency audit
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out the tested revision
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false

      - name: Scan the repository for committed secrets
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.72.0
          scan-type: fs
          scan-ref: .
          scanners: secret
          format: table
          exit-code: "1"

      - name: Set up Python
        if: needs.changes.outputs.python_dependency_audit == 'true'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Audit Python dependencies
        if: needs.changes.outputs.python_dependency_audit == 'true'
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check "pip-audit==2.10.1"
          for service in backend ai_core; do
            test -s "${service}/requirements.lock"
            test -s "${service}/requirements-dev.lock"
            pip-audit --strict --no-deps --disable-pip --progress-spinner=off \
              -r "${service}/requirements.lock"
            pip-audit --strict --no-deps --disable-pip --progress-spinner=off \
              -r "${service}/requirements-dev.lock"
          done

      - name: Set up Node.js
        if: needs.changes.outputs.frontend_dependency_audit == 'true'
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Audit frontend dependencies
        if: needs.changes.outputs.frontend_dependency_audit == 'true'
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Validate release classifier and deployment scripts
        run: |
          set -euo pipefail
          python3 -m unittest scripts/ci/test_release_plan.py
          python3 -m py_compile scripts/ci/release_plan.py scripts/ci/test_release_plan.py
          bash -n deploy/huggingface/prepare-payload.sh
          sh -n deploy/huggingface/entrypoint.sh
          sh -n deploy/huggingface/healthcheck.sh
          sh -n deploy/huggingface/service-entrypoint.sh
          python3 -m json.tool frontend/vercel.json >/dev/null

      - name: Validate GitHub Actions workflows
        if: needs.changes.outputs.workflow == 'true'
        run: |
          set -euo pipefail
          docker run --rm \
            --volume "${GITHUB_WORKSPACE}:/repo:ro" \
            --workdir /repo \
            rhysd/actionlint@sha256:887a259a5a534f3c4f36cb02dca341673c6089431057242cdc931e9f133147e9

  production-image:
    name: Production image build, scan, and smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [changes, backend, ai-core, frontend, migrations, dependency-audit]
    if: >-
      always() &&
      needs.changes.result == 'success' &&
      needs.changes.outputs.production_image == 'true' &&
      (needs.backend.result == 'success' || needs.backend.result == 'skipped') &&
      (needs['ai-core'].result == 'success' || needs['ai-core'].result == 'skipped') &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped') &&
      (needs.migrations.result == 'success' || needs.migrations.result == 'skipped') &&
      needs['dependency-audit'].result == 'success'
    steps:
      - name: Check out the tested revision
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false

      - name: Validate the Hugging Face Docker Space entrypoint
        env:
          HF_CONTEXT: ${{ runner.temp }}/hf-release
        run: |
          set -euo pipefail
          bash deploy/huggingface/prepare-payload.sh \
            "${GITHUB_SHA}" \
            "${HF_CONTEXT}"
          test -s "${HF_CONTEXT}/Dockerfile"
          test -s "${HF_CONTEXT}/README.md"
          test -s "${HF_CONTEXT}/PAYLOAD_MANIFEST.sha256"
          test "$(< "${HF_CONTEXT}/SOURCE_REVISION")" = "${GITHUB_SHA}"
          head -n 20 "${HF_CONTEXT}/README.md" | grep -Fxq "sdk: docker"
          head -n 20 "${HF_CONTEXT}/README.md" | grep -Fxq "app_port: 7860"
          test ! -e "${HF_CONTEXT}/frontend"
          test ! -e "${HF_CONTEXT}/backend/supabase"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          version: v0.34.1

      - name: Build the production image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ${{ runner.temp }}/hf-release
          file: ${{ runner.temp }}/hf-release/Dockerfile
          load: true
          push: false
          tags: manim-agent:${{ github.sha }}
          cache-from: type=gha,scope=production-space
          cache-to: type=gha,mode=max,scope=production-space

      - name: Scan image for fixable high and critical vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.72.0
          image-ref: manim-agent:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Verify the production entrypoint fails closed
        env:
          IMAGE_TAG: manim-agent:${{ github.sha }}
        run: |
          set -euo pipefail
          guard_container="manim-ci-guard-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          cleanup() {
            docker rm --force "${guard_container}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          if docker run --name "${guard_container}" \
            --env APP_ENV=production \
            --env AUTH_MODE=off \
            "${IMAGE_TAG}"; then
            echo "Production image accepted AUTH_MODE=off" >&2
            exit 1
          fi
          guard_logs="$(docker logs "${guard_container}" 2>&1)"
          printf '%s\n' "${guard_logs}"
          grep -Fq "AUTH_MODE must be jwt outside development" <<<"${guard_logs}"

      - name: Smoke test the production image
        env:
          IMAGE_TAG: manim-agent:${{ github.sha }}
        run: |
          set -euo pipefail
          app_container="manim-ci-app-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          cleanup() {
            docker logs "${app_container}" || true
            docker rm --force "${app_container}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker run --detach \
            --name "${app_container}" \
            --publish 17860:7860 \
            --env APP_ENV=production \
            --env AUTH_MODE=jwt \
            --env CORS_ORIGINS=https://frontend-ci.invalid \
            --env PORT=7860 \
            --env INTERNAL_SERVICE_TOKEN=ci-only-internal-token-at-least-32-bytes \
            --env GOOGLE_API_KEY=ci-only-placeholder \
            --env SUPABASE_URL=https://ci.invalid \
            --env SUPABASE_SECRET_KEY=sb_secret_ci_placeholder \
            "${IMAGE_TAG}"

          healthy=false
          for _ in $(seq 1 90); do
            if curl --fail --silent --show-error --max-time 5 http://127.0.0.1:17860/health >/dev/null; then
              healthy=true
              break
            fi
            if [[ "$(docker inspect --format='{{.State.Running}}' "${app_container}" 2>/dev/null || true)" != "true" ]]; then
              break
            fi
            sleep 2
          done
          if [[ "${healthy}" != "true" ]]; then
            echo "Production container did not become healthy" >&2
            exit 1
          fi
          curl --fail --silent --show-error --max-time 10 http://127.0.0.1:17860/health
          curl --fail --silent --show-error --max-time 10 http://127.0.0.1:17860/docs \
            | grep -Fq 'Swagger UI'
          test "$(
            curl --silent --output /dev/null --write-out '%{http_code}' \
              --max-time 10 http://127.0.0.1:17860/
          )" = "404"

          all_running=false
          for _ in $(seq 1 30); do
            supervisor_status="$(
              docker exec "${app_container}" \
                /usr/bin/supervisorctl -c /srv/deploy/supervisord.conf status
            )"
            printf '%s\n' "${supervisor_status}"
            all_running=true
            for process in redis backend ai-worker render-worker; do
              if ! grep -Eq "^${process}[[:space:]]+RUNNING([[:space:]]|$)" \
                <<<"${supervisor_status}"; then
                all_running=false
                break
              fi
            done
            if [[ "${all_running}" == "true" ]]; then
              break
            fi
            sleep 2
          done
          if [[ "${all_running}" != "true" ]]; then
            echo "Not every required Supervisor process reached RUNNING" >&2
            exit 1
          fi

          docker exec "${app_container}" redis-cli -h 127.0.0.1 ping \
            | grep -Fxq PONG

          assert_process_has_no_env() {
            process_name="$1"
            forbidden_pattern="$2"
            process_id="$(
              docker exec "${app_container}" \
                /usr/bin/supervisorctl -c /srv/deploy/supervisord.conf \
                pid "${process_name}"
            )"
            if docker exec "${app_container}" sh -c \
              "tr '\\0' '\\n' </proc/${process_id}/environ | grep -Eq '${forbidden_pattern}'"; then
              echo "${process_name} received a forbidden secret class" >&2
              exit 1
            fi
          }

          assert_process_has_no_env \
            redis \
            '^(INTERNAL_SERVICE_TOKEN|GOOGLE_API_KEY|GOOGLE_API_KEY_[0-9]+|GEMINI_API_KEY|SUPABASE_[A-Z0-9_]*)='
          assert_process_has_no_env \
            backend \
            '^(GOOGLE_API_KEY|GOOGLE_API_KEY_[0-9]+|GEMINI_API_KEY)='
          assert_process_has_no_env \
            ai-worker \
            '^(SUPABASE_SECRET_KEY|SUPABASE_SERVICE_ROLE_KEY|SUPABASE_JWT_SECRET|SUPABASE_ACCESS_TOKEN|SUPABASE_DB_PASSWORD)='
          assert_process_has_no_env \
            render-worker \
            '^(SUPABASE_SECRET_KEY|SUPABASE_SERVICE_ROLE_KEY|SUPABASE_JWT_SECRET|SUPABASE_ACCESS_TOKEN|SUPABASE_DB_PASSWORD)='

          docker exec --interactive "${app_container}" \
            /srv/deploy/service-entrypoint.sh render-worker \
            env PYTHONPATH=/srv/ai_core:/srv \
            /opt/ai-venv/bin/python - <<'PY'
          from pathlib import Path
          from uuid import UUID

          from app.renderer import render_manim_code

          artifact_url = render_manim_code(
              UUID("00000000-0000-0000-0000-000000000099"),
              """from manim import *

          class GeneratedScene(Scene):
              def construct(self):
                  self.play(Write(MathTex(r"x^2 + y^2")), run_time=0.2)
                  self.wait(0.1)
          """,
              {"video_quality": "480p", "fps": 15},
          )
          artifact = Path(artifact_url.removeprefix("file://"))
          if not artifact.is_file() or artifact.stat().st_size == 0:
              raise SystemExit("Manim smoke render did not produce a video")
          artifact.unlink()
          PY

  ci-gate:
    name: CI Gate
    if: always()
    needs: [changes, backend, ai-core, frontend, migrations, dependency-audit, production-image]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CHANGES_RESULT: ${{ needs.changes.result }}
      BACKEND_RESULT: ${{ needs.backend.result }}
      AI_CORE_RESULT: ${{ needs['ai-core'].result }}
      FRONTEND_RESULT: ${{ needs.frontend.result }}
      MIGRATIONS_RESULT: ${{ needs.migrations.result }}
      SECURITY_RESULT: ${{ needs['dependency-audit'].result }}
      IMAGE_RESULT: ${{ needs['production-image'].result }}
      BACKEND_SELECTED: ${{ needs.changes.outputs.backend }}
      AI_CORE_SELECTED: ${{ needs.changes.outputs.ai_core }}
      FRONTEND_SELECTED: ${{ needs.changes.outputs.frontend }}
      MIGRATIONS_SELECTED: ${{ needs.changes.outputs.migrations }}
      IMAGE_SELECTED: ${{ needs.changes.outputs.production_image }}
    steps:
      - name: Require every selected check to pass
        run: |
          set -euo pipefail
          for result_name in \
            CHANGES_RESULT \
            BACKEND_RESULT \
            AI_CORE_RESULT \
            FRONTEND_RESULT \
            MIGRATIONS_RESULT \
            SECURITY_RESULT \
            IMAGE_RESULT; do
            result="${!result_name}"
            if [[ "${result}" != "success" && "${result}" != "skipped" ]]; then
              echo "::error::${result_name} finished with ${result}."
              exit 1
            fi
          done
          if [[ "${CHANGES_RESULT}" != "success" || "${SECURITY_RESULT}" != "success" ]]; then
            echo "::error::Release scope and repository security checks must always succeed."
            exit 1
          fi

          for pair in \
            "${BACKEND_SELECTED}:${BACKEND_RESULT}" \
            "${AI_CORE_SELECTED}:${AI_CORE_RESULT}" \
            "${FRONTEND_SELECTED}:${FRONTEND_RESULT}" \
            "${MIGRATIONS_SELECTED}:${MIGRATIONS_RESULT}" \
            "${IMAGE_SELECTED}:${IMAGE_RESULT}"; do
            selected="${pair%%:*}"
            result="${pair#*:}"
            if [[ "${selected}" == "true" && "${result}" != "success" ]]; then
              echo "::error::A selected CI scope was not executed successfully."
              exit 1
            fi
          done
          echo "All selected CI scopes passed."
