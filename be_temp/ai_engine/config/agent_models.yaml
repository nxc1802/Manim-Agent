defaults:
  temperature: 0.4
  max_tokens: 2048

stable_or: &stable_or dashscope/qwen-plus
stable_qwen: &stable_qwen dashscope/qwen-plus
stable_visual: &stable_visual openrouter/google/gemma-4-31b-it:free

agents:
  director:
    model: *stable_or
    temperature: 0.5
    max_tokens: 2048
    target_scenes: 1
  planner:
    model: *stable_or
    temperature: 0.3
    max_tokens: 6144
  builder:
    model: *stable_qwen
    temperature: 0.1
    max_tokens: 4096
  code_reviewer:
    model: *stable_or
    temperature: 0.1
    max_tokens: 4096
  visual_reviewer:
    model: *stable_visual
    temperature: 0.1
    max_tokens: 4096

builder_review_loop:
  max_rounds: 3
  visual_reviewer_enabled: true
  early_stop:
    require_all:
      - code_review_passed
      - visual_review_passed
  pass_criteria:
    code_review_passed:
      agent_blocking_issues_empty: true
      static_ast_parse_ok: true
      static_forbidden_imports_ok: true
    visual_review_passed:
      agent_blocking_issues_empty: true
  blocking_severity_min: warning
  stop_when_only_info_severity: false
  on_max_rounds_exceeded: fail

runtime_limits:
  worker:
    manim_render_timeout_seconds: 3600
    tts_subprocess_timeout_seconds: 600
  preview_poll:
    timeout_seconds: 1800
    interval_seconds: 2.0
  llm_request_timeout_seconds:
    default: 600
    planner: 600
    builder: 1200
    code_reviewer: 600
    visual_reviewer: 600
